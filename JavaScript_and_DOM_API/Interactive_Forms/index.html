<!-- index.html -->

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="./static/css/style.css" type="text/css" rel="stylesheet">
    <link href="./favicon.ico" type="image/png" rel="icon">
    <title>Interactive Forms</title>
</head>

<body>
    <main>
        <section class="center">
            <h1 class="headline-h1">Submission Form</h1><br>
        </section>
        <section class='container'>
            <form id='saveForm'>
                <label>Name: <br><input class='textInput' type='text'></label><br>
                <label>Address: <br><input class='textInput' type='text'></label><br>
                <label>Age: <br><input class='textInput' type='text'></label><br>
                <label>Pets: <br><input id='petCheckbox' type='checkbox'></label><br>
                <div id='petSelection'>
                    <label>Pet: </label><br>
                    <select>
                        <option value='Dog'>Dog</option>
                        <option value='Cat'>Cat</option>
                        <option value='Bird'>Bird</option>
                        <option value='Other'>Other</option>
                    </select><br>
                </div><br>
                <input id='saveButton' type='submit' value='Save'>
            </form>
        </section>
    </main>
    <script src="./static/js/main.js" type="text/javascript"></script>
</body>

</html>
