<!-- index.html -->

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="./static/css/style.css" type="text/css" rel="stylesheet">
    <link href="./favicon.ico" type="image/png" rel="icon">
    <title>Spanish Flashcards</title>
</head>

<body>
    <main>
        <section class="center">
            <h1 class="headline-h1">JavaScript Spanish Flashcards! 🇪🇸</h1><br><br>
        </section>
        <section class='container'>
            <div class='card'>
                <figure><img src="./static/images/apple.png"></figure>
                <h3 class='card-title'>Apple</h3>
                <button class='card-button'>Show</button>
                <p class='card-answer'>Manzana</p>
            </div>
            <div class='card'>
                <figure><img src="./static/images/dog.png"></figure>
                <h3 class='card-title'>Dog</h3>
                <button class='card-button'>Show</button>
                <p class='card-answer'>Perro</p>
            </div>
            <div class='card'>
                <figure><img src="./static/images/city.png"></figure>
                <h3 class='card-title'>City</h3>
                <button class='card-button'>Show</button>
                <p class='card-answer'>Ciudad</p>
            </div>
            <div class='card'>
                <figure><img src="./static/images/chair.png"></figure>
                <h3 class='card-title'>Chair</h3>
                <button class='card-button'>Show</button>
                <p class='card-answer'>Silla</p>
            </div>
        </section>
    </main>
    <script src="./static/js/script.js" type="text/javascript"></script>
</body>

</html>
